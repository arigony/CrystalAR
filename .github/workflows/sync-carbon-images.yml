name: Sync carbon images

on:
  push:
    branches:
      - agent/crystalar-5.3.0-carbon
    paths:
      - scripts/fetch-mineral-images.py
      - scripts/apply-v530.py
      - .github/workflows/sync-carbon-images.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crystalar-5.3.0-carbon
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Fetch and normalize licensed images
        run: python scripts/fetch-mineral-images.py
      - name: Apply CrystalAR 5.3 migration
        run: python scripts/apply-v530.py
      - name: Commit generated assets and version files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/minerals index.html src/runtime-watchdog.js src/provenance.js CITATION.cff
          if git diff --cached --quiet; then
            echo "Assets and version files already synchronized."
            exit 0
          fi
          git commit -m "Synchronize CrystalAR 5.3 assets and publication metadata"
          git push origin HEAD:agent/crystalar-5.3.0-carbon
