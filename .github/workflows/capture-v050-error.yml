name: Capture CrystalAR v0.5.0 update error

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  capture-error:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'v0.5.0-expanded-gallery'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.5.0-expanded-gallery
          fetch-depth: 0

      - name: Reproduce and capture update error
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/build-v050.yml').read_text(encoding='utf-8').splitlines()
          scripts = []
          index = 0
          while index < len(lines):
              if lines[index].startswith('        run: |'):
                  index += 1
                  captured = []
                  while index < len(lines):
                      line = lines[index]
                      if line.startswith('          '):
                          captured.append(line[10:])
                          index += 1
                          continue
                      if not line.strip():
                          captured.append('')
                          index += 1
                          continue
                      break
                  scripts.append('\n'.join(captured).rstrip() + '\n')
                  continue
              index += 1
          for number, script in enumerate(scripts):
              Path(f'/tmp/v050-step-{number}.sh').write_text('set -euo pipefail\n' + script, encoding='utf-8')
          PY
          bash /tmp/v050-step-0.sh
          set +e
          bash /tmp/v050-step-1.sh > v050-update-error.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Update unexpectedly succeeded" > v050-update-error.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v050-update-error.log
          git commit -m "Capture v0.5.0 update diagnostic"
          git push origin HEAD:v0.5.0-expanded-gallery
