name: CrystalAR quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply pending 5.3.1 source migration
        if: hashFiles('scripts/apply-v531.py') != ''
        run: |
          python -m pip install --disable-pip-version-check pillow==11.3.0
          python scripts/apply-v531.py
          python scripts/fetch-mineral-images.py
          python - <<'PY'
          from pathlib import Path
          for path in Path('tests').glob('*.mjs'):
              text = path.read_text(encoding='utf-8')
              text = text.replace(r'5\.3\.0', r'5\.3\.1')
              path.write_text(text, encoding='utf-8')
          PY
      - run: npm run check
      - name: Run automated tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/crystalar-test.log
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crystalar-test-report
          path: /tmp/crystalar-test.log
          if-no-files-found: ignore
      - name: Verify real browser startup
        run: npm run smoke:browser
      - name: Commit validated 5.3.1 release
        if: success() && hashFiles('scripts/apply-v531.py') != ''
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          rm -f scripts/apply-v531.py .github/workflows/apply-v531.yml
          git add -A
          git commit -m 'CrystalAR 5.3.1 — compact mineral images and accessible zoom'
          git push origin HEAD:${GITHUB_HEAD_REF}
      - name: Verify published GitHub Pages version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          url="https://arigony.github.io/CrystalAR/package.json?commit=${GITHUB_SHA}"
          for attempt in $(seq 1 24); do
            published="$(curl -fsSL --retry 2 --max-time 20 "$url" || true)"
            if node -e 'const fs=require("fs"); const expected=process.argv[1]; const data=JSON.parse(fs.readFileSync(0,"utf8")); process.exit(data.version===expected?0:1)' "$version" <<<"$published"; then
              echo "Published CrystalAR v${version} verified on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt}: GitHub Pages has not published v${version} yet."
            sleep 10
          done
          echo "GitHub Pages did not publish CrystalAR v${version} within the verification window."
          exit 1
