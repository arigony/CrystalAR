name: Sync licensed mineral images

on:
  push:
    branches:
      - agent/crystalar-5.2.0-mineral-images
    paths:
      - scripts/fetch-mineral-images.py
      - .github/workflows/sync-mineral-images.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crystalar-5.2.0-mineral-images
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install image dependency
        run: python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Fetch and normalize licensed images
        run: python scripts/fetch-mineral-images.py
      - name: Commit generated assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/minerals
          if git diff --cached --quiet; then
            echo "Mineral images already synchronized."
            exit 0
          fi
          git commit -m "Add licensed mineral photographs [mineral-images]"
          git push origin HEAD:agent/crystalar-5.2.0-mineral-images
