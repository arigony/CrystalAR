name: Stage CrystalAR v0.5.0 builder

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  staged-builder:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'v0.5.0-expanded-gallery'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.5.0-expanded-gallery
          fetch-depth: 0

      - name: Extract embedded scripts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          lines = Path('.github/workflows/build-v050.yml').read_text(encoding='utf-8').splitlines()
          scripts = []
          index = 0
          while index < len(lines):
              if lines[index].startswith('        run: |'):
                  index += 1
                  captured = []
                  while index < len(lines):
                      line = lines[index]
                      if line.startswith('      - name:') or line.startswith('      - uses:'):
                          break
                      captured.append(line[10:] if line.startswith('          ') else line)
                      index += 1
                  scripts.append('\n'.join(captured).rstrip() + '\n')
                  continue
              index += 1

          if len(scripts) != 4:
              raise SystemExit(f'Expected four embedded scripts, found {len(scripts)}')

          for number, script in enumerate(scripts):
              Path(f'/tmp/v050-step-{number}.sh').write_text('set -euo pipefail\n' + script, encoding='utf-8')
          PY

      - name: Download and verify COD CIFs
        run: bash /tmp/v050-step-0.sh

      - name: Update gallery, metadata and release tests
        shell: bash
        run: |
          set -euo pipefail
          bash /tmp/v050-step-1.sh
          python - <<'PY'
          from pathlib import Path

          legacy = Path('tests/reproducible-workflow.test.mjs')
          text = legacy.read_text(encoding='utf-8')
          text = text.replace('0\\.4\\.1', '0\\.5\\.0')
          text = text.replace('nove estruturas locais', 'dezesseis estruturas locais')
          text = text.replace('assert.equal(exampleButtons.length, 9);', 'assert.equal(exampleButtons.length, 16);')
          legacy.write_text(text, encoding='utf-8')

          Path('tests/gallery-v050.test.mjs').write_text('''import test from "node:test";
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";

          const index = await readFile(new URL("../index.html", import.meta.url), "utf8");
          const app = await readFile(new URL("../src/app.js", import.meta.url), "utf8");
          const provenance = await readFile(new URL("../src/provenance.js", import.meta.url), "utf8");

          const keys = ["sulfurAlpha", "sulfurBeta", "sulfurGamma", "sulfurS6", "iodine", "mof5", "zif8"];

          test("v0.5.0 apresenta as novas famílias didáticas", () => {
            assert.match(index, /Versão v0\.5\.0/);
            assert.match(index, /Enxofre molecular/);
            assert.match(index, /Cristal molecular/);
            assert.match(index, /Redes metal-orgânicas/);
          });

          for (const key of keys) {
            test(`exemplo ${key} está conectado à interface e à proveniência`, () => {
              assert.ok(index.includes(`data-example="${key}"`));
              assert.ok(app.includes(`${key}:`));
              assert.ok(provenance.includes(`${key}:`));
            });
          }

          test("MOFs usam cela 1x1x1 por desempenho", () => {
            assert.match(app, /mof5:[\s\S]*?supercell: 1/);
            assert.match(app, /zif8:[\s\S]*?supercell: 1/);
          });
          ''', encoding='utf-8')

          Path('v050-validation-error.log').unlink(missing_ok=True)
          PY

      - name: Validate syntax, CIFs and browser startup
        shell: bash
        run: |
          set +e
          bash /tmp/v050-step-2.sh > /tmp/v050-validation-full.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 120 /tmp/v050-validation-full.log > v050-validation-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add v050-validation-error.log
            git commit -m "Capture v0.5.0 validation diagnostic"
            git push origin HEAD:v0.5.0-expanded-gallery
            exit "$status"
          fi
          cat /tmp/v050-validation-full.log

      - name: Commit generated v0.5.0 release
        run: bash /tmp/v050-step-3.sh

      - name: Remove temporary build hooks
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin v0.5.0-expanded-gallery
          rm -f .github/workflows/staged-v050-pr.yml .v050-build-trigger
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Clean temporary v0.5.0 build hooks"
          git push origin HEAD:v0.5.0-expanded-gallery
