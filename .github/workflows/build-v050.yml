name: Build CrystalAR v0.5.0 gallery

on:
  push:
    branches: [v0.5.0-expanded-gallery]

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.5.0-expanded-gallery
          fetch-depth: 0

      - name: Download open COD structures
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p examples
          download() {
            local id="$1" name="$2"
            curl -fsSL --retry 4 --retry-delay 2 \
              "https://www.crystallography.net/cod/${id}.cif" \
              -o "examples/${name}"
            grep -Eq "^data_${id}|_cod_database_code[[:space:]]+${id}" "examples/${name}"
            grep -q "_atom_site_fract_x" "examples/${name}"
          }
          download 9011362 sulfur-alpha-9011362.cif
          download 4124791 sulfur-beta-4124791.cif
          download 2002079 sulfur-gamma-2002079.cif
          download 9012361 sulfur-s6-9012361.cif
          download 9008595 iodine-9008595.cif
          download 1516287 mof5-1516287.cif
          download 7111973 zif8-7111973.cif

      - name: Update application, metadata and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          VERSION = "0.5.0"
          DATE = "2026-07-21"
          DATE_BR = "21/07/2026"

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f"Marker not found in {label}: {old[:80]!r}")
              return text.replace(old, new, 1)

          # index.html
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          text = text.replace("0.4.1", VERSION)
          text = text.replace(
              "Exemplos locais, estáveis e versionados. O selo <strong>Experimental COD</strong> identifica modelos derivados de determinações experimentais; o grafeno é identificado separadamente como modelo 2D.",
              "Exemplos locais, estáveis e versionados. A galeria compara redes covalentes, cristais moleculares, polimorfismo, sólidos iônicos e materiais porosos. O grafeno permanece identificado como modelo 2D."
          )
          insert = '''
      <section class="example-group" aria-labelledby="sulfurTitle">
        <div class="example-group-heading">
          <h3 id="sulfurTitle">Enxofre molecular</h3>
          <span>alotropia molecular e polimorfismo cristalino</span>
        </div>
        <div class="example-grid">
          <button class="example-card" type="button" data-example="sulfurAlpha" aria-pressed="false">
            <strong>α-S₈</strong><span class="badge experimental">Ortorrômbico · COD</span>
          </button>
          <button class="example-card" type="button" data-example="sulfurBeta" aria-pressed="false">
            <strong>β-S₈</strong><span class="badge experimental">Monoclínico · COD</span>
          </button>
          <button class="example-card" type="button" data-example="sulfurGamma" aria-pressed="false">
            <strong>γ-S₈</strong><span class="badge experimental">Monoclínico · COD</span>
          </button>
          <button class="example-card" type="button" data-example="sulfurS6" aria-pressed="false">
            <strong>Ciclo-S₆</strong><span class="badge experimental">Molécula S₆ · COD</span>
          </button>
        </div>
      </section>

      <section class="example-group" aria-labelledby="molecularTitle">
        <div class="example-group-heading">
          <h3 id="molecularTitle">Cristal molecular</h3>
          <span>moléculas discretas e forças intermoleculares</span>
        </div>
        <div class="example-grid">
          <button class="example-card" type="button" data-example="iodine" aria-pressed="false">
            <strong>Iodo sólido, I₂</strong><span class="badge experimental">Molecular · COD</span>
          </button>
        </div>
      </section>

      <section class="example-group" aria-labelledby="porousTitle">
        <div class="example-group-heading">
          <h3 id="porousTitle">Redes metal-orgânicas</h3>
          <span>nós, ligantes, topologia e poros</span>
        </div>
        <div class="example-grid">
          <button class="example-card" type="button" data-example="mof5" aria-pressed="false">
            <strong>MOF-5</strong><span class="badge experimental">Zn₄O–BDC · COD</span>
          </button>
          <button class="example-card" type="button" data-example="zif8" aria-pressed="false">
            <strong>ZIF-8</strong><span class="badge experimental">Zn–imidazolato · COD</span>
          </button>
        </div>
      </section>

'''
          marker = '      <section class="example-group" aria-labelledby="ionicTitle">'
          text = replace_once(text, marker, insert + marker, "index.html")
          text = text.replace(
              "Arquivos experimentais da galeria: derivados de entradas COD CC0, com COD ID e referência preservados. O navegador não consulta o COD automaticamente. Grafeno: modelo 2D explicitamente identificado.",
              "Arquivos experimentais da galeria: cópias locais de entradas COD CC0, com COD ID e referência preservados. MOF-5 e ZIF-8 são células experimentais e podem ser mais pesados em celulares. O navegador não consulta o COD automaticamente. Grafeno: modelo 2D explicitamente identificado."
          )
          path.write_text(text, encoding="utf-8")

          # src/app.js
          path = Path("src/app.js")
          text = path.read_text(encoding="utf-8")
          entries = '''  sulfurAlpha: {
    label: "Enxofre α-S₈",
    path: "examples/sulfur-alpha-9011362.cif",
    codId: "9011362",
    provenance: "Determinação experimental COD 9011362",
    teachingNote: "Polimorfo ortorrômbico do S₈, estável em condições ambientes. A unidade molecular é um anel coroado de oito átomos de enxofre.",
    representation: "ball-stick", showBonds: true, supercell: 1
  },
  sulfurBeta: {
    label: "Enxofre β-S₈",
    path: "examples/sulfur-beta-4124791.cif",
    codId: "4124791",
    provenance: "Determinação experimental COD 4124791",
    teachingNote: "Polimorfo monoclínico do S₈. Possui a mesma molécula cíclica do α-S₈, mas outro empacotamento cristalino.",
    representation: "ball-stick", showBonds: true, supercell: 1
  },
  sulfurGamma: {
    label: "Enxofre γ-S₈",
    path: "examples/sulfur-gamma-2002079.cif",
    codId: "2002079",
    provenance: "Determinação experimental COD 2002079",
    teachingNote: "Outro polimorfo monoclínico do S₈. Compare a forma da cela e o empacotamento com α-S₈ e β-S₈.",
    representation: "ball-stick", showBonds: true, supercell: 1
  },
  sulfurS6: {
    label: "Ciclo-S₆",
    path: "examples/sulfur-s6-9012361.cif",
    codId: "9012361",
    provenance: "Determinação experimental COD 9012361",
    teachingNote: "Alótropo molecular constituído por anéis S₆. Aqui muda a identidade molecular, não apenas o empacotamento do S₈.",
    representation: "ball-stick", showBonds: true, supercell: 2
  },
  iodine: {
    label: "Iodo sólido — I₂",
    path: "examples/iodine-9008595.cif",
    codId: "9008595",
    provenance: "Determinação experimental COD 9008595",
    teachingNote: "Cristal molecular formado por moléculas discretas I₂. A ligação intramolecular I–I é distinta das interações intermoleculares no sólido.",
    representation: "ball-stick", showBonds: true, supercell: 2
  },
  mof5: {
    label: "MOF-5 — IRMOF-1",
    path: "examples/mof5-1516287.cif",
    codId: "1516287",
    provenance: "Determinação experimental COD 1516287",
    teachingNote: "Rede metal-orgânica cúbica formada por unidades Zn₄O conectadas por ligantes tereftalato (BDC). Observe os grandes vazios periódicos.",
    representation: "wire", showBonds: true, supercell: 1
  },
  zif8: {
    label: "ZIF-8",
    path: "examples/zif8-7111973.cif",
    codId: "7111973",
    provenance: "Determinação experimental COD 7111973",
    teachingNote: "Rede de Zn tetraédrico e 2-metilimidazolato, com topologia do tipo sodalita. É um exemplo de MOF com conectividade semelhante à de zeólitas.",
    representation: "wire", showBonds: true, supercell: 1
  },
'''
          text = replace_once(text, "  nacl: {", entries + "  nacl: {", "src/app.js")
          path.write_text(text, encoding="utf-8")

          # src/provenance.js
          path = Path("src/provenance.js")
          text = path.read_text(encoding="utf-8")
          text = text.replace('const APP_VERSION = "v0.4.1";', 'const APP_VERSION = "v0.5.0";')
          text = text.replace('const INCORPORATED_ON = "20/07/2026";', f'const INCORPORATED_ON = "{DATE_BR}";')
          prov = '''    sulfurAlpha: { label: "Enxofre α-S₈", path: "examples/sulfur-alpha-9011362.cif", codId: "9011362", type: "Determinação experimental COD" },
    sulfurBeta: { label: "Enxofre β-S₈", path: "examples/sulfur-beta-4124791.cif", codId: "4124791", type: "Determinação experimental COD" },
    sulfurGamma: { label: "Enxofre γ-S₈", path: "examples/sulfur-gamma-2002079.cif", codId: "2002079", type: "Determinação experimental COD" },
    sulfurS6: { label: "Ciclo-S₆", path: "examples/sulfur-s6-9012361.cif", codId: "9012361", type: "Determinação experimental COD" },
    iodine: { label: "Iodo sólido — I₂", path: "examples/iodine-9008595.cif", codId: "9008595", type: "Determinação experimental COD" },
    mof5: { label: "MOF-5 — IRMOF-1", path: "examples/mof5-1516287.cif", codId: "1516287", type: "Determinação experimental COD" },
    zif8: { label: "ZIF-8", path: "examples/zif8-7111973.cif", codId: "7111973", type: "Determinação experimental COD" },
'''
          text = replace_once(text, "    nacl:", prov + "    nacl:", "src/provenance.js")
          path.write_text(text, encoding="utf-8")

          # tests/gallery.test.mjs
          path = Path("tests/gallery.test.mjs")
          text = path.read_text(encoding="utf-8")
          rows = '''  ["sulfur-alpha-9011362.cif", "9011362", null],
  ["sulfur-beta-4124791.cif", "4124791", null],
  ["sulfur-gamma-2002079.cif", "2002079", null],
  ["sulfur-s6-9012361.cif", "9012361", null],
  ["iodine-9008595.cif", "9008595", null],
  ["mof5-1516287.cif", "1516287", null],
  ["zif8-7111973.cif", "7111973", null],
'''
          text = replace_once(text, '  ["nacl-1000041.cif"', rows + '  ["nacl-1000041.cif"', "tests/gallery.test.mjs")
          text = text.replace(
              "    assert.equal(model.unitAtoms.length, expectedAtoms);",
              "    if (expectedAtoms == null) assert.ok(model.unitAtoms.length > 0);\n    else assert.equal(model.unitAtoms.length, expectedAtoms);"
          )
          path.write_text(text, encoding="utf-8")

          Path("tests/gallery-v050.test.mjs").write_text('''import test from "node:test";
import assert from "node:assert/strict";
import { readFile } from "node:fs/promises";

const index = await readFile(new URL("../index.html", import.meta.url), "utf8");
const app = await readFile(new URL("../src/app.js", import.meta.url), "utf8");
const provenance = await readFile(new URL("../src/provenance.js", import.meta.url), "utf8");

const keys = ["sulfurAlpha", "sulfurBeta", "sulfurGamma", "sulfurS6", "iodine", "mof5", "zif8"];

test("v0.5.0 apresenta as novas famílias didáticas", () => {
  assert.match(index, /Versão v0\.5\.0/);
  assert.match(index, /Enxofre molecular/);
  assert.match(index, /Cristal molecular/);
  assert.match(index, /Redes metal-orgânicas/);
});

for (const key of keys) {
  test(`exemplo ${key} está conectado à interface e à proveniência`, () => {
    assert.match(index, new RegExp(`data-example=["']${key}["']`));
    assert.match(app, new RegExp(`\\b${key}:`));
    assert.match(provenance, new RegExp(`\\b${key}:`));
  });
}

test("MOFs usam cela 1x1x1 por desempenho", () => {
  assert.match(app, /mof5:[\s\S]*?supercell: 1/);
  assert.match(app, /zif8:[\s\S]*?supercell: 1/);
});
''', encoding="utf-8")

          # package.json
          path = Path("package.json")
          package = json.loads(path.read_text(encoding="utf-8"))
          package["version"] = VERSION
          path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          # CITATION.cff
          path = Path("CITATION.cff")
          text = path.read_text(encoding="utf-8")
          import re
          text = re.sub(r'^version:.*$', 'version: "0.5.0"', text, flags=re.M)
          text = re.sub(r'^date-released:.*$', f'date-released: "{DATE}"', text, flags=re.M)
          path.write_text(text, encoding="utf-8")

          # README.md: concise, current documentation
          Path("README.md").write_text('''# CrystalAR

**CrystalAR** é um visualizador educacional aberto para estruturas cristalográficas em 3D e realidade aumentada no navegador.

## Versão

`v0.5.0` — galeria expandida com 16 estruturas, proveniência reproduzível e funcionamento independente de CORS.

## Galeria didática local

### Formas do carbono

- diamante — COD `9012293`;
- grafite 2H — COD `1200017`;
- grafeno — modelo periódico 2D educacional com vácuo artificial.

### Enxofre molecular

- α-S₈ ortorrômbico — COD `9011362`;
- β-S₈ monoclínico — COD `4124791`;
- γ-S₈ monoclínico — COD `2002079`;
- ciclo-S₆ — COD `9012361`.

A comparação diferencia **polimorfismo** — mesma molécula S₈ em empacotamentos diferentes — de **alotropia molecular**, representada pela mudança de S₈ para S₆.

### Cristal molecular

- iodo sólido, I₂ — COD `9008595`.

### Sólidos iônicos

- NaCl — COD `1000041`;
- CsCl — COD `9008789`;
- MgO — COD `1011173`;
- CaF₂ — COD `1000043`.

### Redes metal-orgânicas

- MOF-5/IRMOF-1 — COD `1516287`;
- ZIF-8 — COD `7111973`.

Os MOFs são abertos inicialmente em `1×1×1` e wireframe para reduzir o custo gráfico em celulares.

### Polimorfos do ZnS

- blenda de zinco — COD `9000107`;
- wurtzita 2H — COD `1100044`.

## Fluxo reproduzível para outros CIFs

1. informe o COD ID;
2. abra a URI oficial do COD;
3. salve o CIF no dispositivo;
4. abra o arquivo localmente no CrystalAR;
5. registre COD ID, URI, data, versão do aplicativo e SHA-256.

O navegador não consulta o COD automaticamente. Essa arquitetura segue a recomendação técnica recebida da equipe do COD e mantém a origem dos dados explícita.

## Funcionalidades

- galeria local categorizada e responsiva;
- ball-and-stick, space-filling e wireframe;
- cela unitária e supercelas `1×1×1`, `2×2×2` e `3×3×3`;
- upload local de `.cif` e `.mcif`;
- cálculo de SHA-256 no navegador;
- painel de metadados, nota didática, referência e proveniência;
- WebAR com câmera, rastreamento de mão e fallback por toque ou mouse.

## Testes

```bash
npm run check
npm test
```

Os testes verificam sintaxe, inicialização real em navegador, parser, galeria, CIFs locais, proveniência e conexão entre os cartões e seus arquivos.

## Limitações

- o parser cobre CIF 1.1 comum, não todos os casos avançados;
- ligações são inferidas geometricamente;
- ocupações parciais e desordem podem exigir curadoria adicional;
- células de MOFs são grandes e podem reduzir o desempenho em celulares;
- o grafeno é um modelo 2D educacional, não uma determinação cristalográfica 3D.

## Fonte e licença

Código: MIT. Dados locais experimentais: entradas COD disponibilizadas em CC0, com reconhecimento dos autores originais e dos COD IDs.

## Autor

Prof. Dr. André Arigony Souto  
PUCRS — Pontifícia Universidade Católica do Rio Grande do Sul  
ORCID: 0000-0002-2437-8767
''', encoding="utf-8")
          PY

      - name: Validate v0.5.0
        run: |
          npm run check
          npm test

      - name: Commit generated release
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/build-v050.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release CrystalAR v0.5.0 expanded educational gallery"
          git push origin HEAD:v0.5.0-expanded-gallery
