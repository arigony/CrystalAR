name: Apply CrystalAR 5.3.1

on:
  push:
    branches:
      - agent/crystalar-5.3.1-image-zoom
    paths:
      - .github/workflows/apply-v531.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Run CrystalAR 5.3.1 update'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crystalar-5.3.1-image-zoom
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Apply interface and metadata changes
        run: python scripts/apply-v531.py
      - name: Fetch and normalize licensed images
        run: python scripts/fetch-mineral-images.py
      - name: Validate JavaScript syntax
        run: npm run check
      - name: Run automated tests
        run: npm test
      - name: Verify Chrome rendering
        run: npm run smoke:browser
      - name: Remove temporary automation
        run: rm -f scripts/apply-v531.py .github/workflows/apply-v531.yml
      - name: Commit validated release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'CrystalAR 5.3.1 — compact mineral images and accessible zoom'
          git push origin HEAD:agent/crystalar-5.3.1-image-zoom
